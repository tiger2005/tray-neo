name: Build Release DLL

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [Win32, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: cmd
        run: |
          set "REPO_ROOT=%CD%"
          msbuild src\TrayNeo.vcxproj /t:Rebuild /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:SolutionDir="%REPO_ROOT%\\" /m /v:minimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TrayNeo-${{ matrix.platform }}
          path: |
            Bin\**\plugins\TrayNeo.dll
            Bin\**\plugins\TrayNeo.pdb

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/TrayNeo-Win32/TrayNeo.dll release/TrayNeo-Win32.dll
          cp artifacts/TrayNeo-Win32/TrayNeo.pdb release/TrayNeo-Win32.pdb
          cp artifacts/TrayNeo-x64/TrayNeo.dll release/TrayNeo-x64.dll
          cp artifacts/TrayNeo-x64/TrayNeo.pdb release/TrayNeo-x64.pdb

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/TrayNeo-Win32.dll
            release/TrayNeo-Win32.pdb
            release/TrayNeo-x64.dll
            release/TrayNeo-x64.pdb
